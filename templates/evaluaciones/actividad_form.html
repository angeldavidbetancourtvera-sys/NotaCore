<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if form.instance.pk %}Editar actividad{% else %}Crear actividad{% endif %}</title>
</head>
<body>
    <h1>{% if form.instance.pk %}Editar actividad{% else %}Crear actividad{% endif %}</h1>
    {% if plan %}
    <p>Plan: {{ plan.aula.año_curso }}° Año — {{ plan.get_lapso_display }}</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar</button>
        <a href="{% url 'evaluaciones:profesor_planes' %}">Regresar</a>
    </form>
</body>
</html>
