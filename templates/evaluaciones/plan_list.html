<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes de evaluación</title>
</head>
<body>
    <main class="page-shell">
        <section class="page-header">
            <h1 class="page-caption">Planes disponibles</h1>
            <h2 class="page-title">Planes de evaluación</h2>
            <p class="page-subtitle">Revisa, edita y evalúa tus planes activos.</p>
        </section>

        <section class="section-panel">
            <div class="form-footer">
                <a class="button" href="{% url 'evaluaciones:profesor_plan_nuevo' %}">Crear nuevo plan</a>
            </div>

            <div class="card-grid">
                {% for plan in planes %}
                <article class="card">
                    <p><strong>{{ plan.aula.año_curso }}° Año</strong></p>
                    <p>{{ plan.get_lapso_display }}</p>
                    <p>{{ plan.objetivo }}</p>
                    <div class="form-footer">
                        <a class="button-secondary" href="{% url 'evaluaciones:profesor_plan_detalle' plan.pk %}">Ver detalle</a>
                    </div>
                </article>
                {% empty %}
                <div class="card">
                    <p>No hay planes creados.</p>
                </div>
                {% endfor %}
            </div>
            <div class="form-footer">
                <a class="button-secondary" href="{% url 'evaluaciones:profesor_dashboard' %}">Volver al dashboard</a>
            </div>
        </section>
    </main>
</body>
</html>
