<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes de evaluación</title>
</head>
<body>
    <h1>Planes de evaluación</h1>
    <p><a href="{% url 'evaluaciones:profesor_plan_nuevo' %}">Crear nuevo plan</a></p>

    <ul>
        {% for plan in planes %}
        <li>
            <strong>{{ plan.aula.año_curso }}° Año</strong> — {{ plan.get_lapso_display }} — {{ plan.objetivo }}
            <br>
            <a href="{% url 'evaluaciones:profesor_actividad_nuevo' plan.pk %}">Agregar actividad</a>
        </li>
        {% empty %}
        <li>No hay planes creados.</li>
        {% endfor %}
    </ul>
</body>
</html>
