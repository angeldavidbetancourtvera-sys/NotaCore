<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignar estudiante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1 class="h3 mb-4">Asignar estudiante a un aula</h1>
        <form method="post" class="card p-4 shadow-sm">
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div class="mb-3">
                <label class="form-label">Aula</label>
                <select name="aula" class="form-select">
                    {% for item in aulas %}
                        <option value="{{ item.pk }}" {% if aula and item.pk == aula.pk %}selected{% endif %}>{{ item }}</option>
                    {% endfor %}
                </select>
            </div>
            {% for field in form %}
                <div class="mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger small">{{ field.errors|striptags }}</div>{% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">Asignar</button>
            <a href="{% url 'evaluaciones:profesor_dashboard' %}" class="btn btn-outline-secondary">Volver</a>
        </form>
    </div>
</body>
</html>
