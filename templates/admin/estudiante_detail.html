<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle estudiante - NotaCore</title>
</head>
<body>
    <h1>Detalle del estudiante</h1>
    <p><strong>Nombre:</strong> {{ estudiante.usuario.get_full_name }}</p>
    <p><strong>Cédula:</strong> {{ estudiante.usuario.cedula }}</p>
    <p><strong>Email:</strong> {{ estudiante.usuario.email }}</p>

    <form method="post">
        {% csrf_token %}
        <p>
            <label for="representante"><strong>Representante:</strong></label><br>
            <input type="text" id="representante" name="representante" value="{{ estudiante.representante }}" maxlength="200">
        </p>
        <p>
            <label for="telefono_representante"><strong>Teléfono:</strong></label><br>
            <input type="text" id="telefono_representante" name="telefono_representante" value="{{ estudiante.telefono_representante }}" maxlength="20">
        </p>
        <button type="submit">Guardar cambios</button>
    </form>

    <p><a href="{% url 'academico:estudiante_list' %}">Volver a estudiantes</a> | <a href="{% url 'academico:admin_dashboard' %}">Regresar</a></p>
</body>
</html>
