<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del aula - NotaCore</title>
</head>
<body>
    <h1>Detalle del aula</h1>
    <p><strong>Año:</strong> {{ aula.año_curso }}° Año</p>
    <p><strong>Profesor:</strong> {{ aula.profesor.usuario.get_full_name }}</p>
    <p><strong>Lapsos:</strong> {{ aula.get_lapsos_display }}</p>
    <p><strong>Estado:</strong> {% if aula.activo %}Activa{% else %}Inactiva{% endif %}</p>
    <p><a href="{% url 'academico:aula_update' aula.pk %}">Editar</a> | <a href="{% url 'academico:aula_list' %}">Volver a la lista</a> | <a href="{% url 'academico:admin_dashboard' %}">Regresar</a></p>
</body>
</html>
