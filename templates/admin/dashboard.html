<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel administrativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1 class="h3 mb-4">Panel administrativo</h1>
        <div class="row g-3">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Aulas</h5>
                        <p class="display-6 mb-0">{{ total_aulas }}</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Profesores</h5>
                        <p class="display-6 mb-0">{{ total_profesores }}</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Estudiantes</h5>
                        <p class="display-6 mb-0">{{ total_estudiantes }}</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-4">
            <a href="{% url 'academico:aula_list' %}" class="btn btn-primary">Gestionar aulas</a>
            <a href="{% url 'academico:usuario_list' %}" class="btn btn-outline-secondary">Gestionar usuarios</a>
        </div>
    </div>
</body>
</html>
