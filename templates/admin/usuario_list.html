<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1 class="h3 mb-4">Usuarios</h1>
        <form method="get" class="mb-3">
            {{ search_form.q }}
            <button type="submit" class="btn btn-primary">Buscar</button>
        </form>
        <div class="list-group">
            {% for usuario in usuarios %}
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <strong>{{ usuario.get_full_name }}</strong><br>
                        <small>{{ usuario.cedula }} · {{ usuario.email }} · {{ usuario.rol }}</small>
                    </div>
                    <a href="{% url 'academico:usuario_delete' usuario.pk %}" class="btn btn-sm btn-outline-danger">Eliminar</a>
                </div>
            {% empty %}
                <div class="alert alert-info">No hay usuarios.</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
