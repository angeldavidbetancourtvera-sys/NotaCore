<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de aulas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1 class="h3 mb-4">Aulas</h1>
        <a href="{% url 'academico:aula_create' %}" class="btn btn-primary mb-3">Nueva aula</a>
        <div class="list-group">
            {% for aula in aulas %}
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <strong>{{ aula }}</strong><br>
                        <small>{{ aula.get_lapsos_display }}</small>
                    </div>
                    <div>
                        <a href="{% url 'academico:aula_update' aula.pk %}" class="btn btn-sm btn-outline-primary">Editar</a>
                        <a href="{% url 'academico:aula_delete' aula.pk %}" class="btn btn-sm btn-outline-danger">Eliminar</a>
                    </div>
                </div>
            {% empty %}
                <div class="alert alert-info">No hay aulas registradas.</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
