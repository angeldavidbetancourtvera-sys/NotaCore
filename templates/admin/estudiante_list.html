<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudiantes - NotaCore</title>
</head>
<body>
    <h1>Estudiantes</h1>
    <ul>
        {% for estudiante in estudiantes %}
        <li>
            <a href="{% url 'academico:estudiante_detail' estudiante.pk %}">{{ estudiante.usuario.get_full_name }}</a>
            <span>— {{ estudiante.usuario.email }}</span>
        </li>
        {% empty %}
        <li>No hay estudiantes registrados.</li>
        {% endfor %}
    </ul>
    <p><a href="{% url 'academico:admin_dashboard' %}">Volver al panel</a></p>
</body>
</html>
